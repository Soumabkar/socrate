version: "3.8"

# ================================================================
# Stack Socrates — Trois tiers
# Frontend  : Angular 17 / Nginx (dist/socrates-frontend)
# Backend   : Spring Boot 3.3 / Java 21 — /api, Flyway, JWT
# Database  : PostgreSQL 16 — socrates_db / socrates_user
# ================================================================

networks:
  socrates-net:
    driver: bridge

volumes:
  postgres-data:
  backend-logs:

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: socrates-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-socrates_db}
      POSTGRES_USER:     ${POSTGRES_USER:-socrates_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-socrates_pass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - socrates-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-socrates_user} -d ${POSTGRES_DB:-socrates_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Spring Boot 3.3 / Java 21 ───────────────────────────────
  # Flyway crée automatiquement le schéma (V1__init_schema.sql)
  # Swagger UI : http://localhost:8080/api/swagger-ui.html
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    image: socrates-backend:1.0.0
    container_name: socrates-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER:          ${POSTGRES_USER:-socrates_user}
      POSTGRES_PASSWORD:      ${POSTGRES_PASSWORD:-socrates_pass}
      JWT_SECRET:             ${JWT_SECRET:-socrates-very-long-secret-key-for-hs256-algorithm-min-256-bits}
    volumes:
      - backend-logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - socrates-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 90s

  # ── Angular 17 / Nginx ──────────────────────────────────────
  # outputPath: dist/socrates-frontend (angular.json)
  # SPA routing: try_files $uri /index.html
  # Proxy: /api/* → backend:8080/api/*
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    image: socrates-frontend:1.0.0
    container_name: socrates-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - socrates-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
