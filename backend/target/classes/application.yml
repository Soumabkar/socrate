spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/socrates_db
    username: socrates_user
    password: socrates_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gère le schéma
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

socrates:
  jwt:
    secret: socrates-very-long-secret-key-for-hs256-algorithm-min-256-bits
    expiration-ms: 86400000      # 24h
  cors:
    allowed-origins:
      - http://localhost:4200     # Angular dev
      - http://localhost:3000     # Site présentation

logging:
  level:
    com.socrates: DEBUG
    org.springframework.security: INFO
