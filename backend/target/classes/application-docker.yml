spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/socrates_db
    username: ${POSTGRES_USER:socrates_user}
    password: ${POSTGRES_PASSWORD:socrates_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

socrates:
  jwt:
    secret: ${JWT_SECRET:socrates-very-long-secret-key-for-hs256-algorithm-min-256-bits}
    expiration-ms: 86400000
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:4200

logging:
  level:
    com.socrates: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
